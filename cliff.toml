# yaml-language-server: $schema=https://www.schemastore.org/any.json

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- [`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/commit/{{ commit.id }}) {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}
"""
footer = """

This changelog was generated with [git-cliff](https://github.com/orhun/git-cliff).
"""
trim = true

[git]
conventional_commits = true
filter_commits = false
filter_unconventional = false
split_commits = false
commit_parsers = [
    { message = "^Merge branch", skip = true },
    { message = "^Merge pull request", skip = true },
    { message = "^chore\\(release\\): prepare for", skip = true },
    { message = "^.*\\[feat\\]", group = "Features" },
    { message = "^.*\\[fix\\]", group = "Bug Fixes" },
    { message = "^.*\\[docs\\]", group = "Documentation" },
    { message = "^.*\\[test\\]", group = "Tests" },
    { message = "^.*\\[ci\\]", group = "CI" },
    { message = "^.*\\[build\\]", group = "Build" },
    { message = "^.*\\[chore\\]", group = "Chores" },
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^docs?", group = "Documentation" },
    { message = "^test", group = "Tests" },
    { message = "^ci", group = "CI" },
    { message = "^build", group = "Build" },
    { message = "^chore", group = "Chores" },
    { message = ".*", group = "Changes" },
]
topo_order = false
sort_commits = "newest"

[remote]
offline = true

[remote.github]
owner = "Nick2bad4u"
repo = "remark-lint-frontmatter-validation"
