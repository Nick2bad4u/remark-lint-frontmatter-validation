# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: "Release"

run-name: "Release ${{ github.ref_name || inputs.version || inputs.release_type }} @${{ github.actor }}"

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            release_type:
                description: "Release bump type"
                required: true
                default: "patch"
                type: "choice"
                options:
                    - "patch"
                    - "minor"
                    - "major"
            version:
                description: "Explicit release version in x.y.z format"
                required: false
                type: "string"
            ref:
                description: "Branch or ref to release from"
                required: false
                default: "main"
                type: "string"

defaults:
    run:
        shell: "bash"

permissions:
    contents: "write"
    id-token: "write"

concurrency:
    group: "release-${{ github.ref || inputs.version || inputs.release_type }}"
    cancel-in-progress: true

jobs:
    release:
        name: "Publish"
        runs-on: "ubuntu-latest"
        timeout-minutes: 20

        steps:
            - name: "Checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  fetch-depth: 0
                  ref: "${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}"

            - name: "Setup Node"
              uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
              with:
                  node-version: "24"
                  registry-url: "https://registry.npmjs.org"
                  package-manager-cache: false

            - name: "Install"
              run: "npm ci"

            - name: "Resolve release version"
              id: "vars"
              env:
                  EVENT_NAME: "${{ github.event_name }}"
                  INPUT_RELEASE_TYPE: "${{ inputs.release_type }}"
                  INPUT_VERSION: "${{ inputs.version }}"
              run: |
                  if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
                    EXPLICIT_VERSION="${INPUT_VERSION}"
                    RELEASE_TYPE="${INPUT_RELEASE_TYPE}"

                    if [ -n "${EXPLICIT_VERSION}" ]; then
                      if ! [[ "${EXPLICIT_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                        echo "version must be in x.y.z format" >&2
                        exit 1
                      fi
                      NEXT_VERSION="${EXPLICIT_VERSION}"
                    else
                      LATEST_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
                      BASE_VERSION="${LATEST_TAG#v}"
                      if [ -z "${LATEST_TAG}" ]; then
                        BASE_VERSION="$(node -p "require('./package.json').version")"
                      fi
                      IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE_VERSION}"
                      case "${RELEASE_TYPE}" in
                        patch) PATCH=$((PATCH + 1)) ;;
                        minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                        major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                        *) echo "Unsupported release_type: ${RELEASE_TYPE}" >&2; exit 1 ;;
                      esac
                      NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
                    fi
                    TAG="v${NEXT_VERSION}"
                  else
                    TAG="${GITHUB_REF_NAME}"
                  fi

                  if ! [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "Resolved tag '${TAG}' is not in vX.Y.Z format" >&2
                    exit 1
                  fi

                  echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
                  echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

            - name: "Prepare package version"
              run: "npm version --allow-same-version --no-git-tag-version '${{ steps.vars.outputs.version }}'"

            - name: "Verify"
              run: "npm run release:verify"

            - name: "Generate release notes"
              id: "git-cliff"
              uses: "orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5" # v4
              with:
                  config: "cliff.toml"
                  args: "--verbose --tag ${{ steps.vars.outputs.tag }} --strip header"
              env:
                  OUTPUT: "release-notes.md"
                  GITHUB_REPO: "${{ github.repository }}"

            - name: "Publish npm package"
              run: "npm publish --access public --provenance"

            - name: "Create GitHub release"
              env:
                  GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
                  NOTES: "${{ steps.git-cliff.outputs.changelog }}"
                  TAG: "${{ steps.vars.outputs.tag }}"
              run: |
                  if gh release view "$TAG" >/dev/null 2>&1; then
                    gh release edit "$TAG" --notes-file "$NOTES"
                  else
                    gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" --notes-file "$NOTES"
                  fi
