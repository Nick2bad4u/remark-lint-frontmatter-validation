# ===============================================================================
# SonarCloud Configuration for remark-lint-frontmatter-validation
# ===============================================================================

sonar.organization=nick2bad4u
sonar.projectKey=Nick2bad4u_remark-lint-frontmatter-validation
sonar.projectName=remark-lint-frontmatter-validation
sonar.host.url=https://sonarcloud.io

sonar.sources=src
sonar.tests=test

sonar.exclusions=**/.github/**,**/node_modules/**,**/dist/**,**/coverage/**,**/.cache/**,**/*.d.ts
sonar.cpd.exclusions=test/**,tests/**,**/test/**,**/tests/**
sonar.test.inclusions=test/**,tests/**,**/test/**,**/tests/**

sonar.typescript.file.suffixes=.ts,.tsx,.mts,.cts
sonar.javascript.file.suffixes=.js,.jsx,.mjs,.cjs
sonar.typescript.tsconfigPaths=tsconfig.json,tsconfig.build.json,tsconfig.vitest-typecheck.json

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=test/**,**/test/**,**/*.d.ts

sonar.sourceEncoding=UTF-8
sonar.scm.provider=git
sonar.javascript.detectBundles=true
sonar.qualitygate.wait=true
